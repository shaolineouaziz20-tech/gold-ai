<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold AI - AI Chart Analyst</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body style="background-color: #0f172a; color: #f8fafc; font-family: sans-serif; padding: 20px;">
    <div style="max-width: 1000px; margin: 0 auto;">
        
        <!-- الـ Navbar باش ترجع للـ Dashboard -->
        <div style="background: #1e293b; padding: 15px 20px; border-bottom: 2px solid #334155; display: flex; justify-content: space-between; align-items: center; border-radius: 8px; margin-bottom: 40px;">
            <div style="font-weight: bold; color: #e2b047; font-size: 1.2rem;"><i class="fa-solid fa-brain"></i> AI Chart Analyst</div>
            <div>
                <a href="/" style="color: #000; text-decoration: none; padding: 8px 16px; background: #e2b047; border-radius: 6px; font-weight: bold; font-size: 0.9rem; margin-right: 10px;"><i class="fa-solid fa-chart-line"></i> الـ Dashboard الرئيسية</a>
            </div>
        </div>

        <h1 style="color: #e2b047; text-align: center; font-size: 2.5rem; margin-bottom: 10px;">Gold AI - Chart Analyst</h1>
        <p style="text-align: center; color: #94a3b8; margin-bottom: 30px;">لوّح السكرين شوت ديال الشارت هنا والـ AI غايجبد ليك أقوى الـ OBs و الـ FVGs بـ SMC</p>
        
        <form id="analyseForm">
            <div class="upload-zone" id="dropZone" style="border: 2px dashed #e2b047; background: #1e293b; padding: 40px; text-align: center; border-radius: 12px; cursor: pointer; margin-bottom: 20px;">
                <i class="fa-solid fa-cloud-arrow-up" style="font-size: 54px; color: #e2b047; margin-bottom: 15px;"></i>
                <p>اضغط هنا أو قم بسحب صورة الشارت (Screenshot)</p>
                <input type="file" id="chartInput" name="chart_img" accept="image/*" style="display: none;">
                <img id="preview" alt="Chart Preview" style="max-width: 100%; max-height: 450px; display: none; margin: 20px auto; border-radius: 8px;">
            </div>
            <button type="submit" id="analyseBtn" style="background-color: #e2b047; color: #000; border: none; padding: 14px 24px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; display: none;">بدأ التحليل الذكي للذهب <i class="fa-solid fa-wand-magic-sparkles"></i></button>
        </form>

        <div class="loading" id="loading" style="display: none; text-align: center; margin: 30px 0;">
            <i class="fa-solid fa-spinner fa-spin" style="color: #e2b047; font-size: 40px; margin-bottom: 10px;"></i>
            <p>الـ AI كيقرا السيولة ويحدد الـ Bias دابا... تسنى ثواني</p>
        </div>

        <div id="result" style="background: #1e293b; padding: 25px; border-radius: 12px; margin-top: 25px; display: none; white-space: pre-line; line-height: 1.8; border-left: 5px solid #e2b047; font-size: 1.1rem;"></div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
