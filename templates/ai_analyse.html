<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 Gold AI - محلل الشارت بالذكاء الاصطناعي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* ====== RESET ====== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: #0a0e17;
            color: #e0e0e0;
            min-height: 100vh;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* ====== HEADER ====== */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #1a2332;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .gold-icon {
            font-size: 40px;
            animation: goldShine 2s infinite;
        }
        
        @keyframes goldShine {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .logo h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
        }
        
        .logo h1 span {
            -webkit-text-fill-color: #fff;
            color: #fff;
        }
        
        .back-btn {
            color: #888;
            text-decoration: none;
            padding: 10px 24px;
            border: 1px solid #1a2332;
            border-radius: 10px;
            transition: all 0.3s;
            font-weight: 600;
        }
        
        .back-btn:hover {
            background: #1a2332;
            color: #fff;
        }
        
        /* ====== UPLOAD SECTION ====== */
        .upload-section {
            background: #111927;
            border-radius: 20px;
            padding: 30px;
            border: 1px solid #1a2332;
        }
        
        .upload-box {
            border: 2px dashed #2a3a52;
            border-radius: 16px;
            padding: 50px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #0d1520;
        }
        
        .upload-box:hover {
            border-color: #f7971e;
            background: #111927;
        }
        
        .upload-box.dragover {
            border-color: #ffd200;
            background: #1a2332;
            transform: scale(1.02);
        }
        
        .upload-icon {
            font-size: 60px;
            display: block;
            margin-bottom: 15px;
        }
        
        .upload-content h2 {
            font-size: 22px;
            margin-bottom: 10px;
            color: #fff;
        }
        
        .upload-content p {
            color: #888;
            margin-bottom: 5px;
        }
        
        .formats {
            font-size: 12px;
            color: #555;
        }
        
        .upload-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s;
        }
        
        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        /* ====== PREVIEW ====== */
        #previewContainer {
            margin-top: 20px;
            text-align: center;
            display: none;
        }
        
        #previewContainer h3 {
            color: #fff;
            margin-bottom: 10px;
        }
        
        #imagePreview {
            max-width: 100%;
            max-height: 400px;
            border-radius: 12px;
            border: 1px solid #1a2332;
        }
        
        /* ====== ANALYZE BUTTON ====== */
        .analyze-btn {
            width: 100%;
            padding: 16px;
            margin-top: 20px;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            color: #0a0e17;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: none;
        }
        
        .analyze-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .analyze-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 25px rgba(247, 151, 30, 0.4);
        }
        
        /* ====== RESULT ====== */
        #resultContainer {
            margin-top: 30px;
            display: none;
        }
        
        .result-box {
            background: #111927;
            border-radius: 20px;
            padding: 30px;
            border: 1px solid #1a2332;
        }
        
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid #1a2332;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .result-header h2 {
            color: #fff;
            font-size: 22px;
        }
        
        .result-header .result-icon {
            font-size: 30px;
        }
        
        .copy-btn {
            padding: 8px 20px;
            background: #1a2332;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .copy-btn:hover {
            background: #2a3a52;
        }
        
        .result-content {
            line-height: 2;
            font-size: 16px;
            color: #d0d0d0;
            padding: 20px;
            background: #0d1520;
            border-radius: 12px;
            white-space: pre-wrap;
            max-height: 600px;
            overflow-y: auto;
        }
        
        .result-content strong {
            color: #ffd200;
        }
        
        .result-content h2,
        .result-content h3 {
            color: #fff;
            margin: 15px 0 8px 0;
        }
        
        .result-content .highlight {
            color: #ffd200;
            font-weight: bold;
        }
        
        /* ====== LOADING ====== */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 14, 23, 0.95);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .loading-overlay.show {
            display: flex;
        }
        
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid #1a2332;
            border-top-color: #f7971e;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            margin-top: 20px;
            color: #fff;
            font-size: 18px;
        }
        
        .loading-subtext {
            color: #888;
            font-size: 14px;
            margin-top: 8px;
        }
        
        /* ====== RESPONSIVE ====== */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                text-align: center;
            }
            
            .logo h1 {
                font-size: 20px;
            }
            
            .upload-box {
                padding: 30px 15px;
            }
            
            .upload-icon {
                font-size: 40px;
            }
            
            .result-header {
                flex-direction: column;
                text-align: center;
            }
            
            .result-content {
                font-size: 14px;
                max-height: 400px;
            }
            
            .analyze-btn {
                font-size: 16px;
                padding: 14px;
            }
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 10px;
            }
            
            .logo h1 {
                font-size: 18px;
            }
            
            .upload-box {
                padding: 20px 10px;
            }
            
            .upload-content h2 {
                font-size: 18px;
            }
            
            .back-btn {
                padding: 8px 16px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ===== HEADER ===== -->
        <header>
            <div class="logo">
                <span class="gold-icon">🥇</span>
                <h1>Gold AI <span>Analyzer</span></h1>
            </div>
            <a href="{{ url_for('index') }}" class="back-btn">← العودة للرئيسية</a>
        </header>

        <!-- ===== UPLOAD SECTION ===== -->
        <div class="upload-section">
            <div class="upload-box" id="dropZone">
                <div class="upload-content">
                    <span class="upload-icon">📤</span>
                    <h2>ارفع سكرين شوت الشارت</h2>
                    <p>اسحب الصورة هنا أو اضغط للاختيار</p>
                    <p class="formats">الصيغ المدعومة: PNG, JPG, JPEG, WEBP, GIF</p>
                    <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
                        اختيار صورة
                    </button>
                    <input type="file" id="fileInput" accept="image/*" style="display:none">
                </div>
            </div>

            <!-- Preview -->
            <div id="previewContainer">
                <h3>📸 معاينة الصورة</h3>
                <img id="imagePreview" src="#" alt="معاينة الشارت">
            </div>

            <!-- Analyze Button -->
            <button id="analyzeBtn" class="analyze-btn" disabled>
                🤖 تحليل الشارت بالذكاء الاصطناعي
            </button>
        </div>

        <!-- ===== RESULT ===== -->
        <div id="resultContainer">
            <div class="result-box">
                <div class="result-header">
                    <div>
                        <span class="result-icon">📊</span>
                        <h2>نتائج التحليل</h2>
                    </div>
                    <button class="copy-btn" onclick="copyResult()">📋 نسخ النتائج</button>
                </div>
                <div id="resultContent" class="result-content">
                    <!-- النتائج ستظهر هنا -->
                </div>
            </div>
        </div>
    </div>

    <!-- ===== LOADING OVERLAY ===== -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">⏳ جاري تحليل الشارت...</div>
        <div class="loading-subtext">هذا قد يستغرق بضع ثوانٍ</div>
    </div>

    <script>
        // ============================================================
        //  JAVASCRIPT - التفاعل الكامل
        // ============================================================

        // -------- عناصر الصفحة --------
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const previewContainer = document.getElementById('previewContainer');
        const imagePreview = document.getElementById('imagePreview');
        const resultContainer = document.getElementById('resultContainer');
        const resultContent = document.getElementById('resultContent');
        const loadingOverlay = document.getElementById('loadingOverlay');

        let selectedFile = null;

        // -------- عند الضغط على صندوق الرفع --------
        dropZone.addEventListener('click', () => fileInput.click());

        // -------- عند اختيار ملف --------
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        // -------- السحب والإفلات --------
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        // -------- معالجة الملف المرفوع --------
        function handleFile(file) {
            // التحقق من نوع الملف
            const validTypes = ['image/png', 'image/jpeg', 'image/jpg', 'image/webp', 'image/gif'];
            if (!validTypes.includes(file.type)) {
                alert('❌ نوع الملف غير مدعوم. استخدم PNG, JPG, JPEG, WEBP, أو GIF');
                return;
            }

            // التحقق من الحجم
            if (file.size > 10 * 1024 * 1024) {
                alert('❌ حجم الصورة كبير جداً. الحد الأقصى 10 ميجابايت');
                return;
            }

            selectedFile = file;

            // معاينة الصورة
            const reader = new FileReader();
            reader.onload = (e) => {
                imagePreview.src = e.target.result;
                previewContainer.style.display = 'block';
                analyzeBtn.style.display = 'block';
                analyzeBtn.disabled = false;
                resultContainer.style.display = 'none';
                analyzeBtn.textContent = '🤖 تحليل الشارت بالذكاء الاصطناعي';
            };
            reader.readAsDataURL(file);
        }

        // -------- عند الضغط على زر التحليل --------
        analyzeBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            // إظهار شاشة التحميل
            loadingOverlay.classList.add('show');
            analyzeBtn.disabled = true;
            analyzeBtn.textContent = '⏳ جاري التحليل...';

            const formData = new FormData();
            formData.append('chart_image', selectedFile);

            try {
                const response = await fetch('/ai-analyze', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                // إخفاء شاشة التحميل
                loadingOverlay.classList.remove('show');

                if (data.success) {
                    // عرض النتائج مع تنسيق أفضل
                    let formattedResult = data.analysis
                        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                        .replace(/\n/g, '<br>');
                    
                    resultContent.innerHTML = formattedResult;
                    resultContainer.style.display = 'block';
                    analyzeBtn.textContent = '🔄 تحليل جديد';
                    analyzeBtn.disabled = false;
                    
                    // التمرير إلى النتائج
                    resultContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
                } else {
                    alert('❌ ' + data.error);
                    analyzeBtn.textContent = '🤖 تحليل الشارت بالذكاء الاصطناعي';
                    analyzeBtn.disabled = false;
                }

            } catch (error) {
                loadingOverlay.classList.remove('show');
                alert('❌ حدث خطأ في الاتصال: ' + error.message);
                analyzeBtn.textContent = '🤖 تحليل الشارت بالذكاء الاصطناعي';
                analyzeBtn.disabled = false;
            }
        });

        // -------- دالة نسخ النتائج --------
        function copyResult() {
            const text = resultContent.innerText;
            
            if (!text || text.trim() === '') {
                alert('⚠️ لا يوجد نص للنسخ');
                return;
            }
            
            navigator.clipboard.writeText(text).then(() => {
                alert('✅ تم نسخ التحليل إلى الحافظة');
            }).catch(() => {
                // طريقة بديلة للنسخ
                try {
                    const range = document.createRange();
                    range.selectNode(resultContent);
                    window.getSelection().removeAllRanges();
                    window.getSelection().addRange(range);
                    document.execCommand('copy');
                    alert('✅ تم نسخ التحليل إلى الحافظة');
                } catch (err) {
                    alert('❌ فشل النسخ، حاول تحديد النص يدوياً');
                }
            });
        }

        // -------- عند الضغط على Escape لإلغاء التحميل --------
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && loadingOverlay.classList.contains('show')) {
                loadingOverlay.classList.remove('show');
                analyzeBtn.textContent = '🤖 تحليل الشارت بالذكاء الاصطناعي';
                analyzeBtn.disabled = false;
            }
        });

        // -------- عند الضغط على Enter في أي مكان --------
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !analyzeBtn.disabled && analyzeBtn.style.display !== 'none') {
                analyzeBtn.click();
            }
        });

        console.log('🤖 Gold AI Analyzer loaded successfully!');
        console.log('📊 Upload a chart screenshot to get SMC/ICT analysis.');
    </script>
</body>
</html>
