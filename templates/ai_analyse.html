<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 Gold AI - تحليل الشارت</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* ====== RESET ====== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: #0a0e17;
            color: #e0e0e0;
            min-height: 100vh;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* ====== HEADER ====== */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #1a2332;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo span {
            font-size: 30px;
        }
        
        .logo h2 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
        }
        
        .back-btn {
            color: #888;
            text-decoration: none;
            padding: 8px 20px;
            border: 1px solid #1a2332;
            border-radius: 8px;
            transition: all 0.3s;
        }
        
        .back-btn:hover {
            background: #1a2332;
            color: #fff;
        }
        
        /* ====== UPLOAD ====== */
        .upload-box {
            border: 2px dashed #2a3a52;
            border-radius: 16px;
            padding: 50px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #0d1520;
        }
        
        .upload-box:hover {
            border-color: #f7971e;
        }
        
        .upload-box.dragover {
            border-color: #ffd200;
            background: #1a2332;
        }
        
        .upload-icon {
            font-size: 50px;
            display: block;
            margin-bottom: 10px;
        }
        
        .upload-box h3 {
            color: #fff;
            font-size: 20px;
        }
        
        .upload-box p {
            color: #888;
            margin: 5px 0;
        }
        
        .upload-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s;
        }
        
        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        /* ====== PREVIEW ====== */
        #previewContainer {
            margin-top: 20px;
            text-align: center;
            display: none;
        }
        
        #imagePreview {
            max-width: 100%;
            max-height: 400px;
            border-radius: 12px;
            border: 1px solid #1a2332;
        }
        
        /* ====== ANALYZE BUTTON ====== */
        .analyze-btn {
            width: 100%;
            padding: 16px;
            margin-top: 20px;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            color: #0a0e17;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: none;
        }
        
        .analyze-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 25px rgba(247, 151, 30, 0.4);
        }
        
        /* ====== RESULT ====== */
        #resultContainer {
            margin-top: 30px;
            display: none;
        }
        
        .result-box {
            background: #111927;
            border-radius: 16px;
            padding: 25px;
            border: 1px solid #1a2332;
        }
        
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 1px solid #1a2332;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .result-header h3 {
            color: #fff;
            font-size: 20px;
        }
        
        .copy-btn {
            padding: 6px 16px;
            background: #1a2332;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .copy-btn:hover {
            background: #2a3a52;
        }
        
        .result-content {
            line-height: 2;
            font-size: 15px;
            color: #d0d0d0;
            padding: 15px;
            background: #0d1520;
            border-radius: 10px;
            white-space: pre-wrap;
            max-height: 500px;
            overflow-y: auto;
        }
        
        .result-content strong {
            color: #ffd200;
        }
        
        /* ====== LOADING ====== */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 14, 23, 0.95);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .loading-overlay.show {
            display: flex;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #1a2332;
            border-top-color: #f7971e;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            margin-top: 15px;
            color: #fff;
            font-size: 18px;
        }
        
        /* ====== RESPONSIVE ====== */
        @media (max-width: 600px) {
            header {
                flex-direction: column;
                text-align: center;
            }
            
            .upload-box {
                padding: 30px 15px;
            }
            
            .upload-icon {
                font-size: 40px;
            }
            
            .result-content {
                font-size: 14px;
                max-height: 350px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <header>
            <div class="logo">
                <span>🤖</span>
                <h2>Gold AI Analyzer</h2>
            </div>
            <a href="{{ url_for('index') }}" class="back-btn">← العودة</a>
        </header>

        <!-- UPLOAD -->
        <div class="upload-box" id="dropZone">
            <span class="upload-icon">📤</span>
            <h3>ارفع سكرين شوت الشارت</h3>
            <p>اسحب الصورة هنا أو اضغط للاختيار</p>
            <p style="font-size:12px;color:#555;">PNG, JPG, JPEG, WEBP, GIF</p>
            <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
                اختيار صورة
            </button>
            <input type="file" id="fileInput" accept="image/*" style="display:none">
        </div>

        <!-- PREVIEW -->
        <div id="previewContainer">
            <h3 style="color:#fff;margin-bottom:10px;">📸 معاينة</h3>
            <img id="imagePreview" src="#" alt="معاينة">
        </div>

        <!-- ANALYZE BUTTON -->
        <button id="analyzeBtn" class="analyze-btn" disabled>
            🤖 تحليل الشارت
        </button>

        <!-- RESULT -->
        <div id="resultContainer">
            <div class="result-box">
                <div class="result-header">
                    <h3>📊 نتائج التحليل</h3>
                    <button class="copy-btn" onclick="copyResult()">📋 نسخ</button>
                </div>
                <div id="resultContent" class="result-content"></div>
            </div>
        </div>
    </div>

    <!-- LOADING -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">⏳ جاري التحليل...</div>
    </div>

    <script>
        // ============================================================
        //  JAVASCRIPT
        // ============================================================
        
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const previewContainer = document.getElementById('previewContainer');
        const imagePreview = document.getElementById('imagePreview');
        const resultContainer = document.getElementById('resultContainer');
        const resultContent = document.getElementById('resultContent');
        const loadingOverlay = document.getElementById('loadingOverlay');

        let selectedFile = null;

        // Click to upload
        dropZone.addEventListener('click', () => fileInput.click());

        // File selected
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        // Drag & Drop
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        function handleFile(file) {
            const validTypes = ['image/png', 'image/jpeg', 'image/jpg', 'image/webp', 'image/gif'];
            if (!validTypes.includes(file.type)) {
                alert('❌ نوع الملف غير مدعوم');
                return;
            }

            if (file.size > 10 * 1024 * 1024) {
                alert('❌ الحجم كبير جداً (حد أقصى 10 ميجابايت)');
                return;
            }

            selectedFile = file;

            const reader = new FileReader();
            reader.onload = (e) => {
                imagePreview.src = e.target.result;
                previewContainer.style.display = 'block';
                analyzeBtn.style.display = 'block';
                analyzeBtn.disabled = false;
                resultContainer.style.display = 'none';
            };
            reader.readAsDataURL(file);
        }

        // Analyze
        analyzeBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            loadingOverlay.classList.add('show');
            analyzeBtn.disabled = true;
            analyzeBtn.textContent = '⏳ جاري...';

            const formData = new FormData();
            formData.append('chart_image', selectedFile);

            try {
                const response = await fetch('/ai-analyze', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                loadingOverlay.classList.remove('show');

                if (data.success) {
                    resultContent.innerHTML = data.analysis.replace(/\n/g, '<br>');
                    resultContainer.style.display = 'block';
                    analyzeBtn.textContent = '🔄 تحليل جديد';
                    analyzeBtn.disabled = false;
                } else {
                    alert('❌ ' + data.error);
                    analyzeBtn.textContent = '🤖 تحليل الشارت';
                    analyzeBtn.disabled = false;
                }

            } catch (error) {
                loadingOverlay.classList.remove('show');
                alert('❌ خطأ: ' + error.message);
                analyzeBtn.textContent = '🤖 تحليل الشارت';
                analyzeBtn.disabled = false;
            }
        });

        // Copy
        function copyResult() {
            const text = resultContent.innerText;
            if (!text) return alert('⚠️ لا يوجد نص');
            navigator.clipboard.writeText(text).then(() => {
                alert('✅ تم النسخ');
            }).catch(() => {
                const range = document.createRange();
                range.selectNode(resultContent);
                window.getSelection().removeAllRanges();
                window.getSelection().addRange(range);
                document.execCommand('copy');
                alert('✅ تم النسخ');
            });
        }
    </script>
</body>
</html>
